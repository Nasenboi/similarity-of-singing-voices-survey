name: Docker Image Build and Push

on:
  workflow_dispatch:
  push:
    tags:
      - "*.*.*"
      - "*.*.*-*"

jobs:
  buildAndPush:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repositories and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Get version from git tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
      - name: show version
        run: echo $VERSION
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build the Docker image
        run: docker build . --tag ${{ secrets.DOCKERHUB_USERNAME }}/similarity-of-singing-voices-survey:${{ env.VERSION }}
      - name: Push the Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/similarity-of-singing-voices-survey:${{ env.VERSION }}
