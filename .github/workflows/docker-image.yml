name: Docker Image Build and Push

on:
  workflow_dispatch:
  push:
    tags:
      - "*.*.*"
      - "*.*.*-*"

jobs:
  buildAndPush:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repositories and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: get version code from package.json (npm)
        id: package-version
        uses: martinbeentjes/npm-get-version-action@master
      - name: show version
        run: echo ${{ steps.package-version.outputs.current-version }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build the Docker image
        run: docker build . --tag ${{ secrets.DOCKERHUB_USERNAME }}/similarity-of-singing-voices-survey:${{ steps.package-version.outputs.current-version}}
      - name: Push the Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/similarity-of-singing-voices-survey:${{ steps.package-version.outputs.current-version}}
