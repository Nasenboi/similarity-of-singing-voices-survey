services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:${PORT:-3000}"
    depends_on:
      - mongo
      - fileserver
    environment:
      ROOT_URL: ${APP_ROOT_URL:-http://localhost}
      MONGO_URL: mongodb://mongo:27017/meteor
      PORT: ${PORT:-3000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      METEOR_SETTINGS: '{"private":{"ADMIN_USER":{"password":"${ADMIN_PASSWORD}","username":"${ADMIN_USERNAME}"}}}'

  mongo:
    image: mongo:latest
    command:
      - --storageEngine=wiredTiger
    volumes:
      - ${MONGO_PATH}:/data/db

  fileserver:
    image: nginx:alpine
    ports:
      - "3003:80"
    volumes:
      - ${SONG_FILE_DIR}:/usr/share/nginx/html/songs
      - ${VOCAL_FILE_DIR}:/usr/share/nginx/html/vocals
      - ${DATASET_PATH}:/usr/share/nginx/html/dataset.csv
      - ${TRIPLET_PATH}:/usr/share/nginx/html/triplets.npy
    command: >
      sh -c "
      echo 'server {
        listen 80;
        
        # Serve song files
        location /songs/ {
          alias /usr/share/nginx/html/songs/;
          autoindex off;
        }
        
        # Serve vocal files  
        location /vocals/ {
          alias /usr/share/nginx/html/vocals/;
          autoindex off;
        }
        
        # Serve dataset.csv as a single file
        location /dataset.csv {
          alias /usr/share/nginx/html/dataset.csv;
          add_header Content-Type text/csv;
        }
        
        # Serve triplets.npy as a single file
        location /triplets.npy {
          alias /usr/share/nginx/html/triplets.npy;
          add_header Content-Type application/octet-stream;
        }
      }' > /etc/nginx/conf.d/default.conf &&
      nginx -g 'daemon off;'
      "
