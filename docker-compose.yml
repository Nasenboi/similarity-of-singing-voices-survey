services:
  fileserver:
    image: nginx:alpine
    ports:
      - "3003:80"
    volumes:
      - ${AUDIO_FILE_DIR}:/usr/share/nginx/html/files
    command: >
      sh -c "
      echo 'server {
        listen 80;
        location /files/ {
          root /usr/share/nginx/html;
          autoindex off;
        }
      }' > /etc/nginx/conf.d/default.conf &&
      nginx -g 'daemon off;'
      "
